<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="IRON SERVICE">
  <meta id="og-title" property="og:title" content="Персональное предложение — IRON SERVICE">
  <meta id="og-description" property="og:description" content="Специальная цена для клиентов сервиса IRON SERVICE">
  <meta id="og-image" property="og:image" content="https://1iron.ru/assets/logo-horizontal.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests; style-src 'self' https://fonts.bunny.net 'unsafe-inline'; font-src https://fonts.bunny.net; img-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self' https://docs.google.com https://script.google.com https://script.googleusercontent.com; frame-src 'none'">
  <title>Персональное предложение — IRON SERVICE</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=oswald:400,600,700|pt-sans-narrow:400,700" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/shop.css">
  <style>
    .offer-wrap { max-width: 900px; margin: 0 auto; padding: 1rem 1rem 5rem; }
    .offer-badge { display:inline-block; margin-bottom:.75rem; padding:.25rem .55rem; border-radius:999px; background:rgba(212,160,18,.15); color:#d4a012; font-size:.78rem; letter-spacing:.03em; text-transform:uppercase; }
    .offer-card { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:1rem; }
    .offer-grid { display:grid; grid-template-columns: 1fr 1.1fr; gap:1rem; align-items:start; }
    .offer-image { width:100%; max-height:360px; object-fit:contain; background:rgba(0,0,0,.2); border-radius:10px; }
    .offer-prices { margin: .75rem 0 1rem; }
    .offer-price-old { color: var(--text-muted); text-decoration: line-through; font-size: 1rem; margin-right:.5rem; }
    .offer-price-new { color: var(--gold, #d4a012); font-size: 1.65rem; font-weight:700; }
    .offer-note { color: var(--text-muted); font-size:.85rem; margin-top:.35rem; }
    .offer-actions { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:1rem; }
    .offer-actions .btn { flex: 1 1 180px; }
    .offer-expired { color:#ffb4b4; }
    @media (max-width: 900px) {
      .offer-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo-link">
        <img src="assets/logo-horizontal.png" alt="IRON SERVICE" class="logo-img" width="180" height="48">
      </a>
      <a href="tel:+79288509404" class="header-phone">+7 928 850-94-04</a>
      <button type="button" class="nav-toggle" aria-expanded="false" aria-label="Меню">Меню</button>
      <nav class="main-nav" aria-label="Основное меню">
        <ul>
          <li><a href="index.html">Главная</a></li>
          <li><a href="uslugi.html">Услуги</a></li>
          <li><a href="garantiya.html">Гарантия</a></li>
          <li><a href="magazin.html">Магазин</a></li>
          <li><a href="kontakty.html">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="offer-wrap">
    <span class="offer-badge">Персональное предложение</span>
    <div class="offer-card" id="offerCard">
      <p id="offerStatus">Загрузка предложения…</p>
      <div id="offerContent" hidden>
        <div class="offer-grid">
          <div>
            <img id="offerImage" class="offer-image" src="" alt="">
          </div>
          <div>
            <h1 id="offerTitle" style="margin-top:0;font-size:1.35rem;"></h1>
            <div class="offer-prices">
              <span class="offer-price-old" id="offerRetail"></span>
              <span class="offer-price-new" id="offerSpecial"></span>
              <p class="offer-note" id="offerExpiry"></p>
            </div>
            <div class="offer-actions">
              <button type="button" class="btn btn-primary" id="offerAddCart">+ В корзину по спеццене</button>
              <a class="btn" id="offerCatalogLink" href="magazin.html">Полная карточка товара</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="cart-mobile-bar hybrid-detail-cart-bar" id="offerCartBar" hidden>
    <span class="cart-mobile-bar__info">
      <strong id="offer-cart-count">0</strong> шт. · <strong id="offer-cart-total">—</strong>
    </span>
    <button type="button" class="btn btn-primary" id="offer-cart-toggle">Корзина</button>
  </div>

  <footer class="site-footer hybrid-detail-footer">
    <div class="container footer-bottom">
      <p>© IRON SERVICE · Сочи · <a href="tel:+79288509404">+7 928 850-94-04</a></p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/offer.js?v=2026-07-01-2"></script>
</body>
</html>
